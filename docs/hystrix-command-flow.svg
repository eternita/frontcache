<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 510" role="img" font-family="sans-serif">
<title>HTTP request flow through Hystrix commands in org.frontcache.hystrix</title>
<desc>Requests enter FC_Total, branch to FC_ThroughCache for cacheable GETs or FC_BypassCache for other verbs; cache misses call origin via FC_ThroughCache_WebFilter or _HttpClient; origin failures and open circuits divert to the FallbackResolver.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="230" y="20" width="220" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="44" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Incoming HTTP request</text>
<text x="340" y="62" text-anchor="middle" font-size="12" fill="#5F5E5A">FrontCacheServlet / Filter</text>
<line x1="340" y1="72" x2="340" y2="114" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="230" y="116" width="220" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="141" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">FC_Total</text>
<text x="340" y="159" text-anchor="middle" font-size="12" fill="#534AB7">Input-Requests · semaphore</text>

<text x="232" y="190" text-anchor="middle" font-size="12" fill="#5F5E5A">cacheable GET</text>
<line x1="312" y1="172" x2="178" y2="214" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="470" y="190" text-anchor="middle" font-size="12" fill="#5F5E5A">other / dynamic</text>
<line x1="372" y1="172" x2="518" y2="214" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="50" y="216" width="220" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="160" y="241" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C">FC_ThroughCache</text>
<text x="160" y="259" text-anchor="middle" font-size="12" fill="#0F6E56">Cache-Hits · L1/L2 lookup</text>

<rect x="410" y="216" width="220" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="520" y="241" text-anchor="middle" font-size="14" font-weight="500" fill="#4A1B0C">FC_BypassCache</text>
<text x="520" y="259" text-anchor="middle" font-size="12" fill="#993C1D">Origin-Hits · any verb</text>

<text x="210" y="296" text-anchor="start" font-size="12" fill="#5F5E5A">cache miss / expired</text>
<line x1="160" y1="272" x2="160" y2="310" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="50" y="312" width="220" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="160" y="337" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C">FC_ThroughCache → origin</text>
<text x="160" y="355" text-anchor="middle" font-size="12" fill="#0F6E56">_WebFilter / _HttpClient</text>

<line x1="180" y1="368" x2="252" y2="410" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="470" y1="272" x2="305" y2="410" stroke="#73726c" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="120" y="412" width="220" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="230" y="436" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Origin app</text>
<text x="230" y="454" text-anchor="middle" font-size="12" fill="#5F5E5A">filter chain or HTTP client</text>

<line x1="270" y1="340" x2="455" y2="410" stroke="#9c9a92" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
<line x1="520" y1="272" x2="515" y2="410" stroke="#9c9a92" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

<rect x="410" y="412" width="220" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="520" y="437" text-anchor="middle" font-size="14" font-weight="500" fill="#412402">FallbackResolver</text>
<text x="520" y="455" text-anchor="middle" font-size="12" fill="#854F0B">getFallback() → page</text>

<line x1="60" y1="488" x2="92" y2="488" stroke="#9c9a92" stroke-width="1" stroke-dasharray="5 4"/>
<text x="100" y="492" text-anchor="start" font-size="12" fill="#5F5E5A">dashed = getFallback() on origin error / open circuit</text>
</svg>
