<svg viewBox="0 0 880 580" width="880" height="580" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#475569"/></marker>
    <marker id="am" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#ca8a04"/></marker>
  </defs>
  <rect x="0" y="0" width="880" height="580" fill="#ffffff"/>
  <!-- users -->
  <ellipse cx="130" cy="40" rx="78" ry="26" fill="#f1f5f9" stroke="#475569"/><text x="130" y="44" text-anchor="middle">Users / Bots — US</text>
  <ellipse cx="370" cy="40" rx="78" ry="26" fill="#f1f5f9" stroke="#475569"/><text x="370" y="44" text-anchor="middle">Users / Bots — EU</text>
  <ellipse cx="610" cy="40" rx="82" ry="26" fill="#f1f5f9" stroke="#475569"/><text x="610" y="44" text-anchor="middle">Users / Bots — APAC</text>
  <!-- GSLB -->
  <polygon points="300,150 330,120 410,120 440,150 410,180 330,180" fill="#fef9c3" stroke="#ca8a04"/><text x="370" y="146" text-anchor="middle" font-weight="bold">GSLB</text><text x="370" y="162" text-anchor="middle" fill="#64748b">geo-routing</text>
  <!-- edges -->
  <rect x="45" y="240" width="170" height="56" rx="6" fill="#e0e7ff" stroke="#4338ca"/><text x="130" y="264" text-anchor="middle">Edge FC #1 (US)</text><text x="130" y="280" text-anchor="middle" fill="#64748b">standalone :9080</text>
  <rect x="285" y="240" width="170" height="56" rx="6" fill="#e0e7ff" stroke="#4338ca"/><text x="370" y="264" text-anchor="middle">Edge FC #2 (EU)</text><text x="370" y="280" text-anchor="middle" fill="#64748b">standalone :9080</text>
  <rect x="525" y="240" width="170" height="56" rx="6" fill="#e0e7ff" stroke="#4338ca"/><text x="610" y="264" text-anchor="middle">Edge FC #3 (APAC)</text><text x="610" y="280" text-anchor="middle" fill="#64748b">standalone :9080</text>
  <!-- origin region -->
  <rect x="210" y="380" width="320" height="160" rx="8" fill="#fef2f2" stroke="#dc2626"/>
  <text x="370" y="402" text-anchor="middle" font-weight="bold" fill="#dc2626">Origin region</text>
  <rect x="235" y="415" width="270" height="52" rx="6" fill="#fee2e2" stroke="#dc2626"/><text x="370" y="436" text-anchor="middle">Java web app + FrontCacheFilter</text><text x="370" y="452" text-anchor="middle" fill="#64748b">(in-JVM tier-2 cache)</text>
  <path d="M310,500 v22 a60,10 0 0 0 120,0 v-22 a60,10 0 0 0 -120,0 z" fill="#dcfce7" stroke="#16a34a"/><ellipse cx="370" cy="500" rx="60" ry="10" fill="#dcfce7" stroke="#16a34a"/><text x="370" y="520" text-anchor="middle">DB / services</text>
  <!-- INV -->
  <rect x="630" y="360" width="230" height="64" rx="6" fill="#fff7ed" stroke="#ca8a04"/><text x="745" y="384" text-anchor="middle">Content change →</text><text x="745" y="400" text-anchor="middle">FrontCacheAgentCluster</text><text x="745" y="416" text-anchor="middle" fill="#ca8a04">invalidate all nodes</text>
  <!-- edges: users -> gslb -->
  <line x1="150" y1="62" x2="312" y2="142" stroke="#475569" marker-end="url(#a)"/>
  <line x1="370" y1="66" x2="370" y2="118" stroke="#475569" marker-end="url(#a)"/>
  <line x1="590" y1="62" x2="428" y2="142" stroke="#475569" marker-end="url(#a)"/>
  <!-- gslb -> edges -->
  <line x1="320" y1="172" x2="150" y2="238" stroke="#475569" marker-end="url(#a)"/><text x="200" y="205">nearest</text>
  <line x1="370" y1="182" x2="370" y2="238" stroke="#475569" marker-end="url(#a)"/>
  <line x1="420" y1="172" x2="590" y2="238" stroke="#475569" marker-end="url(#a)"/>
  <!-- edges -> origin -->
  <line x1="130" y1="296" x2="300" y2="414" stroke="#475569" marker-end="url(#a)"/><text x="180" y="360">miss</text>
  <line x1="370" y1="296" x2="370" y2="413" stroke="#475569" marker-end="url(#a)"/>
  <line x1="610" y1="296" x2="445" y2="414" stroke="#475569" marker-end="url(#a)"/>
  <line x1="370" y1="467" x2="370" y2="490" stroke="#475569" marker-end="url(#a)"/>
  <!-- invalidation -->
  <line x1="660" y1="360" x2="630" y2="296" stroke="#ca8a04" stroke-dasharray="4 3" marker-end="url(#am)"/>
  <line x1="700" y1="424" x2="530" y2="445" stroke="#ca8a04" stroke-dasharray="4 3" marker-end="url(#am)"/>
  <line x1="640" y1="380" x2="458" y2="262" stroke="#ca8a04" stroke-dasharray="4 3" marker-end="url(#am)"/>
</svg>
