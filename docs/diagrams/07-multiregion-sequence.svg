<svg viewBox="0 0 850 570" width="850" height="570" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="11">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#475569"/></marker>
  </defs>
  <rect x="0" y="0" width="850" height="570" fill="#ffffff"/>
  <!-- participants -->
  <rect x="20" y="18" width="100" height="34" rx="6" fill="#e2e8f0" stroke="#475569"/><text x="70" y="40" text-anchor="middle">User (EU)</text>
  <rect x="160" y="18" width="100" height="34" rx="6" fill="#fef9c3" stroke="#ca8a04"/><text x="210" y="40" text-anchor="middle">GSLB</text>
  <rect x="305" y="18" width="110" height="34" rx="6" fill="#e0e7ff" stroke="#4338ca"/><text x="360" y="40" text-anchor="middle">Edge FC (EU)</text>
  <rect x="460" y="18" width="120" height="34" rx="6" fill="#fee2e2" stroke="#dc2626"/><text x="520" y="40" text-anchor="middle">Java app + filter</text>
  <rect x="615" y="18" width="90" height="34" rx="6" fill="#dcfce7" stroke="#16a34a"/><text x="660" y="40" text-anchor="middle">DB</text>
  <rect x="735" y="18" width="100" height="34" rx="6" fill="#fff7ed" stroke="#ca8a04"/><text x="785" y="40" text-anchor="middle">App (Cluster)</text>
  <!-- lifelines -->
  <line x1="70" y1="52" x2="70" y2="555" stroke="#94a3b8" stroke-dasharray="3 3"/>
  <line x1="210" y1="52" x2="210" y2="555" stroke="#94a3b8" stroke-dasharray="3 3"/>
  <line x1="360" y1="52" x2="360" y2="555" stroke="#94a3b8" stroke-dasharray="3 3"/>
  <line x1="520" y1="52" x2="520" y2="555" stroke="#94a3b8" stroke-dasharray="3 3"/>
  <line x1="660" y1="52" x2="660" y2="555" stroke="#94a3b8" stroke-dasharray="3 3"/>
  <line x1="785" y1="52" x2="785" y2="555" stroke="#94a3b8" stroke-dasharray="3 3"/>
  <!-- frames -->
  <rect x="35" y="166" width="800" height="46" fill="none" stroke="#cbd5e1"/><rect x="35" y="166" width="80" height="15" fill="#e2e8f0" stroke="#cbd5e1"/><text x="40" y="178" font-size="10">alt edge hit</text>
  <rect x="35" y="220" width="800" height="250" fill="none" stroke="#cbd5e1"/><rect x="35" y="220" width="80" height="15" fill="#e2e8f0" stroke="#cbd5e1"/><text x="40" y="232" font-size="10">else edge miss</text>
  <rect x="55" y="264" width="640" height="40" fill="none" stroke="#bbf7d0"/><rect x="55" y="264" width="80" height="15" fill="#dcfce7" stroke="#bbf7d0"/><text x="60" y="276" font-size="10">alt filter hit</text>
  <rect x="55" y="312" width="640" height="92" fill="none" stroke="#fecaca"/><rect x="55" y="312" width="90" height="15" fill="#fee2e2" stroke="#fecaca"/><text x="60" y="324" font-size="10">else filter miss</text>
  <!-- messages -->
  <line x1="70" y1="80" x2="206" y2="80" stroke="#475569" marker-end="url(#a)"/><text x="80" y="74">resolve www.example.com</text>
  <line x1="210" y1="108" x2="74" y2="108" stroke="#475569" stroke-dasharray="5 3" marker-end="url(#a)"/><text x="80" y="102">nearest edge IP (EU)</text>
  <line x1="70" y1="150" x2="356" y2="150" stroke="#475569" marker-end="url(#a)"/><text x="80" y="144">GET /page</text>
  <line x1="360" y1="196" x2="74" y2="196" stroke="#475569" stroke-dasharray="5 3" marker-end="url(#a)"/><text x="90" y="190">cached page (lowest latency)</text>
  <line x1="360" y1="250" x2="516" y2="250" stroke="#475569" marker-end="url(#a)"/><text x="370" y="244">forward to origin</text>
  <line x1="520" y1="292" x2="364" y2="292" stroke="#475569" stroke-dasharray="5 3" marker-end="url(#a)"/><text x="370" y="286">cached fragment (no DB hit)</text>
  <line x1="520" y1="340" x2="656" y2="340" stroke="#475569" marker-end="url(#a)"/><text x="530" y="334">query</text>
  <line x1="660" y1="366" x2="524" y2="366" stroke="#475569" stroke-dasharray="5 3" marker-end="url(#a)"/><text x="540" y="360">data</text>
  <line x1="520" y1="394" x2="364" y2="394" stroke="#475569" stroke-dasharray="5 3" marker-end="url(#a)"/><text x="370" y="388">HTML + X-frontcache.* headers</text>
  <path d="M360,420 h55 v20 h-53" fill="none" stroke="#475569" marker-end="url(#a)"/><text x="420" y="427">store + resolve includes</text>
  <line x1="360" y1="460" x2="74" y2="460" stroke="#475569" stroke-dasharray="5 3" marker-end="url(#a)"/><text x="90" y="454">page</text>
  <line x1="35" y1="488" x2="835" y2="488" stroke="#cbd5e1" stroke-dasharray="2 2"/><text x="370" y="484" fill="#64748b">Note: on content change</text>
  <line x1="785" y1="512" x2="364" y2="512" stroke="#475569" marker-end="url(#a)"/><text x="400" y="506">invalidate(filter, site-key) → edge</text>
  <line x1="785" y1="538" x2="524" y2="538" stroke="#475569" marker-end="url(#a)"/><text x="540" y="532">invalidate → origin filter</text>
</svg>
