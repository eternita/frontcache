<svg viewBox="0 0 760 380" width="760" height="380" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#475569"/></marker>
  </defs>
  <rect x="0" y="0" width="760" height="380" fill="#ffffff"/>
  <ellipse cx="75" cy="150" rx="58" ry="30" fill="#f1f5f9" stroke="#475569"/><text x="75" y="146" text-anchor="middle">Browser /</text><text x="75" y="160" text-anchor="middle">Bot</text>
  <rect x="200" y="40" width="300" height="210" rx="8" fill="#eef2ff" stroke="#4338ca"/>
  <text x="350" y="62" text-anchor="middle" font-weight="bold" fill="#4338ca">App servlet container (one JVM)</text>
  <rect x="230" y="80" width="240" height="50" rx="6" fill="#e0e7ff" stroke="#4338ca"/><text x="350" y="100" text-anchor="middle">FrontCacheFilter</text><text x="350" y="116" text-anchor="middle" fill="#64748b">url-pattern /example/*</text>
  <rect x="230" y="170" width="240" height="50" rx="6" fill="#e2e8f0" stroke="#475569"/><text x="350" y="190" text-anchor="middle">Your servlets / JSPs</text><text x="350" y="206" text-anchor="middle" fill="#64748b">(MVC controllers)</text>
  <!-- datastores -->
  <path d="M580,72 v50 a60,10 0 0 0 120,0 v-50 a60,10 0 0 0 -120,0 z" fill="#dcfce7" stroke="#16a34a"/><ellipse cx="640" cy="72" rx="60" ry="10" fill="#dcfce7" stroke="#16a34a"/><text x="640" y="100" text-anchor="middle">L1 Ehcache</text><text x="640" y="114" text-anchor="middle" fill="#64748b">in-memory</text>
  <path d="M580,182 v50 a60,10 0 0 0 120,0 v-50 a60,10 0 0 0 -120,0 z" fill="#dcfce7" stroke="#16a34a"/><ellipse cx="640" cy="182" rx="60" ry="10" fill="#dcfce7" stroke="#16a34a"/><text x="640" y="210" text-anchor="middle">L2 Lucene</text><text x="640" y="224" text-anchor="middle" fill="#64748b">FRONTCACHE_HOME/cache</text>
  <path d="M270,302 v40 a80,10 0 0 0 160,0 v-40 a80,10 0 0 0 -160,0 z" fill="#fff7ed" stroke="#ca8a04"/><ellipse cx="350" cy="302" rx="80" ry="10" fill="#fff7ed" stroke="#ca8a04"/><text x="350" y="330" text-anchor="middle">FRONTCACHE_HOME/conf</text>
  <!-- edges -->
  <line x1="133" y1="150" x2="196" y2="145" stroke="#475569" marker-end="url(#a)"/><text x="138" y="138">HTTP :8080</text>
  <line x1="430" y1="130" x2="430" y2="167" stroke="#475569" marker-end="url(#a)"/><text x="436" y="152">miss</text>
  <line x1="270" y1="167" x2="270" y2="133" stroke="#475569" marker-end="url(#a)"/><text x="120" y="250"> </text>
  <line x1="470" y1="100" x2="576" y2="95" stroke="#16a34a" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <line x1="470" y1="115" x2="576" y2="200" stroke="#16a34a" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <line x1="350" y1="250" x2="350" y2="292" stroke="#ca8a04" stroke-dasharray="4 3"/>
  <text x="150" y="200" fill="#64748b">response + X-frontcache.* headers ↑ / cache miss ↓</text>
