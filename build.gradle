		api         	'com.fasterxml.jackson.core:jackson-annotations:2.7.5'
        api         	'org.apache.httpcomponents:httpclient:4.5.1'
        api         	'commons-io:commons-io:2.4'
        api         	'ch.qos.logback:logback-classic:1.1.3'
		api         	'com.netflix.hystrix:hystrix-core:1.5.9'
		api         	'com.netflix.hystrix:hystrix-metrics-event-stream:1.5.9'
		api         	'com.netflix.hystrix:hystrix-serialization:1.5.9' // provides com.netflix.hystrix.serial.SerialHystrixDashboardData (not pulled transitively)
        api         	'net.sf.ehcache:ehcache:2.10.0'
        api         	'com.google.code.gson:gson:2.5'
