plugins {
	id 'com.github.hierynomus.license' version '0.16.1'
	id 'org.gretty' version '3.1.0' apply false // gretty 3.1.x still supports Jetty 9.4 (servlet 3.1.0 / javax); 4.x is Jakarta-only
}

class ExecWait extends DefaultTask {
	@Internal String command
	@Internal String ready
	@Internal String directory

	@TaskAction
	def spawnProcess() {

		ProcessBuilder builder = new ProcessBuilder(command.split(' '))
		builder.redirectErrorStream(true)
		builder.directory(new File(directory))
		Process process = builder.start()

		InputStream stdout = process.getInputStream()
		BufferedReader reader = new BufferedReader(new InputStreamReader(stdout))

		def line
		while ((line = reader.readLine()) != null) {
			println line
			if (line.contains(ready)) {
				println "$command is ready"
				break;
			}
		}

		// Keep draining the spawned process' output in a background daemon thread.
		// Otherwise its stdout pipe buffer fills up and the (long-running) server
		// process blocks on its next log write, hanging it mid-test.
		Thread.startDaemon {
			def l
			while ((l = reader.readLine()) != null) {
				println l
			}
		}
	}
}

license {
    ignoreFailures true
    strictCheck true
    include '**/*.java'
    mapping {
        java = 'SLASHSTAR_STYLE'
    }
}

//build.dependsOn licenseFormat

subprojects {
	apply plugin: 'java-library' // 'java-library' (not 'java') so 'api' transitive deps are available
	apply plugin: 'jacoco'
    version = '1.2.5-SNAPSHOT_2'
    group = 'org.frontcache'

	// Build/test with Java 11 via a toolchain, so the JDK launching Gradle
	// (e.g. 17) is decoupled from the project's target. Gradle auto-detects
	// the installed JDK 11 (Zulu 11) for compilation and test execution.
	java {
		toolchain {
			languageVersion = JavaLanguageVersion.of(11)
		}
	}

	// 'provided' deps (e.g. servlet-api) are on compile & test classpaths but
	// NOT on runtimeClasspath, so they are excluded from the assembled WAR.
	configurations {
		provided
	}

	sourceSets {
		main.compileClasspath += configurations.provided
		test.compileClasspath += configurations.provided
		test.runtimeClasspath += configurations.provided
	}

	jacoco.toolVersion = '0.8.11'

    dependencies {
		testImplementation 'junit:junit:4.12'
    }

    repositories {
        mavenLocal()
        mavenCentral()
    }

    jacocoTestReport {
        reports {
            html.required = true
            xml.required = true
            csv.required = false
        }
    }
	tasks.withType(Test) {
		testLogging {
			showStandardStreams = true
			exceptionFormat 'full'
		}
	}

	test {
		reports.html.outputLocation = layout.buildDirectory.dir('reports/tests/unit')
		reports.junitXml.outputLocation = layout.buildDirectory.dir('test-results/unit')

		jvmArgs '--add-opens=java.base/java.nio=ALL-UNNAMED' // Lucene 6.2.0 MMapDirectory unmap hack on Java 9+

		if (System.getProperty('DEBUG', 'false') == 'true') {
			jvmArgs '-Xdebug',
				'-Xrunjdwp:transport=dt_socket,server=y,suspend=y,address=8001'
		}
	}

	check.dependsOn jacocoTestReport
}


// Resolve AWS credentials the way the old maven-s3-wagon did. Gradle's AwsCredentials —
// unlike the wagon — does NOT consult the AWS default credential chain, so we parse the
// shared credentials file (~/.aws/credentials, profile from $AWS_PROFILE or 'default')
// as a fallback after -P properties and env vars.
def awsSharedCreds() {
	def file = new File(System.getProperty('user.home'), '.aws/credentials')
	def profile = System.getenv('AWS_PROFILE') ?: 'default'
	def creds = [:]
	if (file.exists()) {
		def current = null
		file.eachLine { raw ->
			def line = raw.trim()
			if (line.startsWith('[') && line.endsWith(']')) {
				current = line[1..-2].trim()
			} else if (current == profile && line.contains('=')) {
				def i = line.indexOf('=')
				creds[line.substring(0, i).trim()] = line.substring(i + 1).trim()
			}
		}
	}
	creds
}

// Artifact deployment (was pom.xml). Publishes ONLY the two library modules to the
// Eternita S3 repo. Gradle's maven-publish speaks s3:// natively (no maven-s3-wagon
// equivalent needed). Run with: ./gradlew publish  (or publishToMavenLocal for a dry run)
configure([project(':frontcache-core'), project(':frontcache-agent')]) {
	apply plugin: 'maven-publish'

	java {
		withSourcesJar()   // replaces maven-source-plugin
		withJavadocJar()   // replaces maven-javadoc-plugin
	}

	// -Xdoclint:none equivalent — don't fail the build on javadoc lint
	tasks.withType(Javadoc).configureEach {
		options.addStringOption('Xdoclint:none', '-quiet')
	}

	publishing {
		publications {
			mavenJava(MavenPublication) {
				from components.java // emits api deps into the POM with 'compile' scope; 'provided' stays out
				pom {
					name = "${project.group}:${project.name}"
					description = 'Web page/fragment cache with server side includes'
					url = 'https://www.frontcache.org'
					licenses {
						license {
							name = 'Frontcache license'
							url  = 'https://www.eternita.co/frontcache-license.html'
						}
					}
					developers {
						developer {
							name = 'Dmitriy Pavlikovskiy'
							email = 'pdaviti@gmail.com'
							organization = 'Eternita'
							organizationUrl = 'https://www.eternita.co'
						}
						developer {
							name = 'Serhiy Pavlikovskiy'
							email = 'pavlikovskiy@gmail.com'
							organization = 'Eternita'
							organizationUrl = 'https://www.eternita.co'
						}
					}
					scm {
						connection = 'scm:git:git://github.com/eternita/frontcache.git'
						developerConnection = 'scm:git:ssh://github.com:eternita/frontcache.git'
						url = 'https://github.com/eternita/frontcache/tree/master'
					}
				}
			}
		}
		repositories {
			maven {
				url = 's3://repo.eternita.co/maven2'
				credentials(AwsCredentials) {
					def shared = awsSharedCreds()
					accessKey = project.findProperty('awsAccessKey') ?: System.getenv('AWS_ACCESS_KEY_ID') ?: shared['aws_access_key_id']
					secretKey = project.findProperty('awsSecretKey') ?: System.getenv('AWS_SECRET_ACCESS_KEY') ?: shared['aws_secret_access_key']
				}
			}
		}
	}
}


